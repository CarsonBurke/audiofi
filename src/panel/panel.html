<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audiofi</title>
    <link rel="stylesheet" href="./panel.css" />
  </head>
  <body class="text-[15px] leading-relaxed antialiased">
    <main id="app" class="mx-auto flex max-w-2xl flex-col gap-3.5 p-3.5">
      <!-- Top bar: product mark + theme toggle. Icons injected by panel.ts. -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span id="logo" class="grid h-7 w-7 place-items-center rounded-lg bg-neutral-900 text-white dark:bg-white dark:text-neutral-900"></span>
          <span class="text-sm font-semibold tracking-tight">Audiofi</span>
        </div>
        <div class="flex items-center gap-2">
          <label class="sr-only" for="model-select">Voice model</label>
          <select id="model-select" class="model-select" title="Voice model" aria-label="Voice model"></select>
          <button id="refresh" type="button"
                  class="relative grid h-8 w-8 place-items-center rounded-lg border border-neutral-200 text-neutral-700 hover:border-neutral-400 hover:text-neutral-900 dark:border-neutral-800 dark:text-neutral-300 dark:hover:text-neutral-100"
                  title="Reload this page" aria-label="Reload this page"></button>
          <button id="theme-toggle" type="button"
                  class="grid h-8 w-8 place-items-center rounded-lg border border-neutral-200 text-neutral-700 hover:border-neutral-400 hover:text-neutral-900 dark:border-neutral-800 dark:text-neutral-300 dark:hover:text-neutral-100"
                  title="Theme" aria-label="Toggle theme"></button>
        </div>
      </div>

      <!-- Status / edge-state banner. -->
      <div id="banner"
           class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2.5 text-sm text-amber-700 dark:border-amber-900/60 dark:bg-amber-950/40 dark:text-amber-300"
           role="status" aria-live="polite" hidden></div>

      <!-- Reader header: title, byline, site, estimated listen time. -->
      <header id="reader-header" hidden>
        <h1 id="title" class="mb-1 text-lg font-bold leading-snug"></h1>
        <p id="meta" class="mb-2.5 text-[13px] text-neutral-500 dark:text-neutral-400"></p>
        <div class="h-1.5 overflow-hidden rounded-full bg-neutral-200 dark:bg-neutral-800"
             role="progressbar" aria-label="Listening progress"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progress-fill" class="h-full w-0 rounded-full bg-neutral-900 transition-[width] duration-200 dark:bg-neutral-100"></div>
        </div>
      </header>

      <!-- Player controls (sticky). Glyphs injected by panel.ts. -->
      <section id="controls"
               class="sticky top-0 z-10 flex flex-col gap-3 rounded-xl border border-neutral-200 bg-white/95 p-3 backdrop-blur dark:border-neutral-800 dark:bg-black/90"
               hidden aria-label="Playback controls">
        <div class="flex items-center gap-2">
          <button id="prev" class="icon-btn" type="button" title="Previous paragraph" aria-label="Previous paragraph"></button>
          <button id="play" class="icon-btn play" type="button" title="Play" aria-label="Play"></button>
          <button id="next" class="icon-btn" type="button" title="Next paragraph" aria-label="Next paragraph"></button>
          <button id="stop" class="icon-btn" type="button" title="Stop" aria-label="Stop"></button>
          <!-- Compact, hover-reveal volume + speed (YouTube-style), pushed right. -->
          <div id="volume-slot" class="ml-auto"></div>
          <div id="speed-slot"></div>
        </div>
        <div class="flex flex-col gap-1 text-xs text-neutral-500 dark:text-neutral-400">
          <span>Voice</span>
          <div id="voice-slot" class="mt-1"></div>
        </div>
      </section>

      <!-- Article body; the active block is highlighted. -->
      <article id="body" class="flex flex-col gap-2.5" hidden></article>

      <!-- First-run / empty placeholder. -->
      <div id="placeholder" class="px-3 py-10 text-center text-neutral-500 dark:text-neutral-400">
        <p>Open an article and click <strong class="font-semibold">Read this article aloud</strong>.</p>
      </div>
    </main>

    <script type="module" src="./panel.ts"></script>
  </body>
</html>
