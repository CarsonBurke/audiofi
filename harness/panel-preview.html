<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel preview</title>
    <!-- Minimal chrome.* shim so the real panel module boots in a plain page.
         Captures runtime.onMessage listeners so we can inject a sample article. -->
    <script>
      const _listeners = [];
      const _store = { local: {}, session: {} };
      const area = (name) => ({
        get: (keys) => {
          const out = {};
          const list = Array.isArray(keys) ? keys : [keys];
          for (const k of list) if (k in _store[name]) out[k] = _store[name][k];
          return Promise.resolve(out);
        },
        set: (obj) => {
          Object.assign(_store[name], obj);
          return Promise.resolve();
        },
      });
      window.chrome = {
        storage: { local: area('local'), session: area('session') },
        runtime: {
          sendMessage: () => Promise.resolve(),
          onMessage: { addListener: (fn) => _listeners.push(fn), removeListener: () => {} },
        },
        tabs: { sendMessage: () => Promise.resolve(), query: () => Promise.resolve([]) },
      };
      window.__dispatch = (msg) => _listeners.forEach((fn) => fn(msg, {}, () => {}));
    </script>
  </head>
  <body class="text-[15px] leading-relaxed antialiased">
    <main id="app" class="mx-auto flex max-w-2xl flex-col gap-3.5 p-3.5">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span id="logo" class="grid h-7 w-7 place-items-center rounded-lg bg-neutral-900 text-white dark:bg-white dark:text-neutral-900"></span>
          <span class="text-sm font-semibold tracking-tight">Audiofi</span>
        </div>
        <button id="theme-toggle" type="button"
                class="grid h-8 w-8 place-items-center rounded-lg border border-neutral-200 text-neutral-700 hover:border-neutral-400 hover:text-neutral-900 dark:border-neutral-800 dark:text-neutral-300 dark:hover:text-neutral-100"
                title="Theme" aria-label="Toggle theme"></button>
      </div>
      <div id="banner" class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2.5 text-sm text-amber-700 dark:border-amber-900/60 dark:bg-amber-950/40 dark:text-amber-300" role="status" aria-live="polite" hidden></div>
      <header id="reader-header" hidden>
        <h1 id="title" class="mb-1 text-lg font-bold leading-snug"></h1>
        <p id="meta" class="mb-2.5 text-[13px] text-neutral-500 dark:text-neutral-400"></p>
        <div class="h-1.5 overflow-hidden rounded-full bg-neutral-200 dark:bg-neutral-800" role="progressbar" aria-label="Listening progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progress-fill" class="h-full w-0 rounded-full bg-neutral-900 transition-[width] duration-200 dark:bg-neutral-100"></div>
        </div>
      </header>
      <section id="controls" class="sticky top-0 z-10 flex flex-col gap-3 rounded-xl border border-neutral-200 bg-white/95 p-3 backdrop-blur dark:border-neutral-800 dark:bg-black/90" hidden aria-label="Playback controls">
        <div class="flex items-center justify-center gap-2.5">
          <button id="prev" class="icon-btn" type="button" aria-label="Previous paragraph"></button>
          <button id="play" class="icon-btn play" type="button" aria-label="Play"></button>
          <button id="next" class="icon-btn" type="button" aria-label="Next paragraph"></button>
          <button id="stop" class="icon-btn" type="button" aria-label="Stop"></button>
        </div>
        <div class="flex gap-3.5">
          <label class="flex flex-1 flex-col gap-1 text-xs text-neutral-500 dark:text-neutral-400">
            <span>Voice</span>
            <select id="voice" aria-label="Voice" class="rounded-md border border-neutral-200 bg-white p-1.5 text-sm text-neutral-900 dark:border-neutral-800 dark:bg-neutral-950 dark:text-neutral-100"></select>
          </label>
          <label class="flex flex-1 flex-col gap-1 text-xs text-neutral-500 dark:text-neutral-400">
            <span>Speed <output id="speed-out" class="font-medium text-neutral-700 dark:text-neutral-300">1.00×</output></span>
            <input id="speed" type="range" min="0.75" max="2" step="0.05" value="1" class="mt-2 w-full accent-neutral-900 dark:accent-neutral-100" aria-label="Speech speed" />
          </label>
        </div>
      </section>
      <article id="body" class="flex flex-col gap-2.5" hidden></article>
      <div id="placeholder" class="px-3 py-10 text-center text-neutral-500 dark:text-neutral-400">
        <p>Open an article and click <strong class="font-semibold">Read this article aloud</strong>.</p>
      </div>
    </main>

    <script type="module">
      // Relative ES imports are rewritten by Vite (unlike a `src=` URL, which
      // would resolve above the harness root and 404).
      import '../src/panel/panel.css';
      import '../src/panel/panel.ts';
      // Inject a sample article a tick after the panel boots.
      setTimeout(() => {
        window.__dispatch({
          to: 'panel',
          type: 'EXTRACT_RESULT',
          article: {
            title: 'The Quiet Power of Local AI',
            byline: 'Jane Doe',
            siteName: 'Example Times',
            lang: 'en',
            sourceUrl: 'https://example.com/sample',
            blocks: [
              { kind: 'paragraph', text: 'Running models on-device used to be impractical. Today, small neural networks synthesize speech in real time.' },
              { kind: 'heading', text: 'Why it matters' },
              { kind: 'paragraph', text: 'Privacy improves when no audio leaves the machine. The approach scales from phones to laptops.' },
              { kind: 'paragraph', text: 'It is, in short, a meaningful shift in how we read.' },
            ],
          },
        });
      }, 100);
    </script>
  </body>
</html>
